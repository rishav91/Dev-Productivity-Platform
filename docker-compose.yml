services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: devplatform
      POSTGRES_USER: devplatform
      POSTGRES_PASSWORD: devplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devplatform -d devplatform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
